# Render blueprint for the TMS backend (Node web service).
# Frontend is deployed separately on Vercel (see frontend/vercel.json).
# Secrets (sync: false) must be set in the Render dashboard, never committed.
services:
  - type: web
    name: tms-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      # The deployed Vercel frontend origin, e.g. https://your-app.vercel.app
      - key: FRONTEND_URL
        sync: false
